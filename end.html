<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forever Together ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

min-height:100vh;

background:linear-gradient(
135deg,
#8B005D,
#D81B60,
#FF69B4
);

font-family:Arial,sans-serif;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

color:white;

overflow:hidden;

}


.container{

animation:show 2s ease;

padding:30px;

}


h1{

font-size:45px;

text-shadow:
0 0 15px white,
0 0 35px pink;

}


p{

font-size:22px;

line-height:1.8;

margin:25px;

}


.photo{

width:280px;

height:280px;

object-fit:cover;

border-radius:25px;

border:4px solid white;

box-shadow:0 0 40px white;

}


@keyframes show{

from{

opacity:0;

transform:scale(.7);

}

to{

opacity:1;

transform:scale(1);

}

}


</style>

</head>


<body>


<div class="container">


<h1>
Our Love Story Never Ends... ❤️
</h1>


<p>

Every chapter with you is my favorite memory. 🌹

<br>

Thank you for being my happiness.

<br><br>

Forever & Always ❤️

</p>


<img src="photo1.jpg" class="photo">


</div>


</body>

</html>
