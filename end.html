<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forever Together ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

min-height:100vh;

background:linear-gradient(
135deg,
#8B005D,
#D81B60,
#FF69B4
);

font-family:Arial,sans-serif;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

color:white;

overflow:hidden;

}


.container{

animation:show 2s ease;

padding:30px;

}


h1{

font-size:45px;

opacity:0;

animation:titleShow 3s forwards;

text-shadow:
0 0 15px white,
0 0 35px pink;

}


@keyframes titleShow{

0%{

opacity:0;

transform:translateY(40px);

filter:blur(10px);

}


100%{

opacity:1;

transform:translateY(0);

filter:blur(0);

}

}


p{

font-size:22px;

line-height:1.8;

margin:25px;

}


.photo{

width:280px;

height:280px;

object-fit:cover;

border-radius:25px;

border:4px solid white;

box-shadow:0 0 40px white;

}


@keyframes show{

from{

opacity:0;

transform:scale(.7);

}

to{

opacity:1;

transform:scale(1);

}

}


  .heart{

position:fixed;

top:-40px;

font-size:25px;

pointer-events:none;

animation:heartFall linear forwards;

}


@keyframes heartFall{

0%{

transform:translateY(0);

opacity:1;

}

100%{

transform:translateY(110vh);

opacity:0;

}

}


.petal{

position:fixed;

top:-40px;

font-size:22px;

pointer-events:none;

animation:petalFall linear forwards;

}


@keyframes petalFall{

0%{

transform:translateY(0) rotate(0);

opacity:1;

}

100%{

transform:translateY(110vh) rotate(360deg);

opacity:0;

}

}


.sparkle{

position:fixed;

font-size:20px;

pointer-events:none;

animation:sparkleMove 2s forwards;

}


@keyframes sparkleMove{

0%{

opacity:1;

transform:scale(.5);

}

100%{

opacity:0;

transform:scale(2);

}

}
  #fireworks{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

pointer-events:none;

z-index:999;

}
</style>

</head>


<body>

  <canvas id="fireworks"></canvas>

<div class="container">


<h1>
Our Love Story Never Ends... ❤️
</h1>


<p>

Every chapter with you is my favorite memory. 🌹

<br>

Thank you for being my happiness.

<br><br>

Forever & Always ❤️

</p>


<img src="photo1.jpg" class="photo">


</div>


  <script>

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*window.innerWidth+"px";

heart.style.animationDuration=(4+Math.random()*3)+"s";

document.body.appendChild(heart);


setTimeout(()=>{

heart.remove();

},7000);

}


setInterval(createHeart,500);



function createPetal(){

const petal=document.createElement("div");

petal.className="petal";

petal.innerHTML="🌹";

petal.style.left=Math.random()*window.innerWidth+"px";

petal.style.animationDuration=(5+Math.random()*4)+"s";

document.body.appendChild(petal);


setTimeout(()=>{

petal.remove();

},9000);

}


setInterval(createPetal,1200);



function createSparkle(){

const sparkle=document.createElement("div");

sparkle.className="sparkle";

sparkle.innerHTML="✨";

sparkle.style.left=Math.random()*window.innerWidth+"px";

sparkle.style.top=Math.random()*window.innerHeight+"px";

document.body.appendChild(sparkle);


setTimeout(()=>{

sparkle.remove();

},2000);

}


setInterval(createSparkle,300);


    const canvas=document.getElementById("fireworks");

const ctx=canvas.getContext("2d");


canvas.width=window.innerWidth;

canvas.height=window.innerHeight;



function firework(){

const x=Math.random()*canvas.width;

const y=Math.random()*(canvas.height/2);


for(let i=0;i<40;i++){

ctx.beginPath();

ctx.fillStyle="gold";

ctx.arc(

x+Math.random()*100-50,

y+Math.random()*100-50,

3,

0,

Math.PI*2

);

ctx.fill();

}


setTimeout(()=>{

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

},600);

}


setInterval(firework,1500);



window.addEventListener("resize",()=>{

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

});
    const music = document.getElementById("music");

music.play().catch(function(){});
</script>
  <audio id="music" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>
</body>

</html>
