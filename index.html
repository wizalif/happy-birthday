<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Situuu ❤️</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(
135deg,
#4a0029,
#7a003d,
#b0005d,
#ff4d8d
);

background-size:400% 400%;

animation:bgMove 12s ease infinite;
text-align:center;
overflow:hidden;
}

.card{
background:white;
padding:40px;
border-radius:25px;
width:90%;
max-width:500px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
color:#ff2d75;
font-size:40px;
}

p{
font-size:20px;
color:#555;
line-height:1.6;
}

button{
margin-top:20px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:40px;
background:#ff2d75;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
background:#ff0055;
  @keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}
}
</style>

</head>

<body>

<div class="card">

<h1>🎂 Happy Birthday, Situuu ❤️</h1>

<p>
Today is your special day 🌹<br><br>

I made something special just for you.
</p>

<button onclick="location.href='surprise.html'">
🎁 Open My Surprise
</button>

</div>

</body>
</html>
