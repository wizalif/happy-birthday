<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Story ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial,sans-serif;

background:linear-gradient(135deg,#ff6fa5,#ffd6e8);

color:white;

overflow-x:hidden;

text-align:center;

padding:40px;

}

.container{

max-width:800px;

margin:auto;

}
  .storyBox{

background:rgba(255,255,255,.15);

backdrop-filter:blur(10px);

padding:30px;

border-radius:25px;

margin-top:40px;

box-shadow:0 0 25px rgba(255,255,255,.2);

text-align:left;

}

.storyTitle{

text-align:center;

font-size:30px;

margin-bottom:25px;

}

#storyText{

font-size:21px;

line-height:2;

white-space:pre-line;

}

h1{

font-size:46px;

margin-bottom:25px;

}

</style>

</head>

<body>

<div class="container">

<h1>
📖 Our Story ❤️
</h1>

  <div class="storyBox">

<h2 class="storyTitle">
❤️ Our Journey ❤️
</h2>

<p id="storyText"></p>

</div>
</div>

</body>

</html>
