<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Surprise ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff6fa5,#ffd6e8);
text-align:center;
overflow-x:hidden;
color:white;
}

.container{
padding:30px;
}
 .fade-in{
opacity:0;
animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}
}

h1{
font-size:45px;
margin-top:20px;
animation:fade 2s infinite alternate;
}

@keyframes fade{
from{transform:scale(1);}
to{transform:scale(1.05);}
}

p{
font-size:22px;
margin:20px;
line-height:1.8;
}

.photo{
width:300px;
max-width:90%;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.3);
margin-top:20px;
}

.letter{
background:white;
color:#444;
padding:25px;
border-radius:20px;
max-width:700px;
margin:30px auto;
font-size:20px;
line-height:1.8;
}
 #fireworks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:9999;
}
 .confetti{
position:fixed;
top:-20px;
width:10px;
height:10px;
pointer-events:none;
animation:confettiFall linear forwards;
}

@keyframes confettiFall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}
 .balloon{
position:fixed;
bottom:-120px;
width:50px;
height:70px;
border-radius:50%;
animation:balloonUp linear forwards;
pointer-events:none;
}

.balloon::after{
content:"";
position:absolute;
left:24px;
top:70px;
width:2px;
height:50px;
background:white;
}

@keyframes balloonUp{
from{
transform:translateY(0);
}
to{
transform:translateY(-120vh);
}
}
 .sparkle{
position:fixed;
width:6px;
height:6px;
background:white;
border-radius:50%;
box-shadow:0 0 12px white;
pointer-events:none;
animation:twinkle 2s linear forwards;
}

@keyframes twinkle{
0%{
opacity:1;
transform:scale(0);
}
50%{
opacity:1;
transform:scale(1.5);
}
100%{
opacity:0;
transform:scale(0);
}
}
 .petal{
position:fixed;
top:-30px;
font-size:22px;
pointer-events:none;
animation:petalFall linear forwards;
}

@keyframes petalFall{
0%{
transform:translateY(0) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}
 .gift-box{
margin:30px auto;
width:180px;
padding:20px;
background:#ff4d6d;
border-radius:20px;
font-size:30px;
font-weight:bold;
color:white;
cursor:pointer;
box-shadow:0 0 20px rgba(0,0,0,.3);
transition:0.3s;
}

.gift-box:hover{
transform:scale(1.08);
background:#ff2d55;
}
 #introScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:10000;
animation:fadeOut 4s forwards;
animation-delay:3s;
}

#introScreen h1{
font-size:48px;
color:white;
margin-bottom:20px;
}

#introScreen p{
font-size:22px;
color:#ffd6e8;
}

@keyframes fadeOut{
to{
opacity:0;
visibility:hidden;
}
}
 #finalMessage{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
font-weight:bold;
color:white;
text-shadow:0 0 20px #ff4d6d;
display:none;
z-index:20000;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.1);}
100%{transform:translate(-50%,-50%) scale(1);}
}
 .loveQuote{
position:fixed;
left:0;
top:0;
font-size:22px;
font-weight:bold;
color:white;
text-shadow:0 0 10px #ff4d6d;
pointer-events:none;
opacity:0;
animation:floatQuote 6s linear forwards;
z-index:9998;
}

@keyframes floatQuote{

0%{
opacity:0;
transform:translateY(30px);
}

20%{
opacity:1;
}

80%{
opacity:1;
}

100%{
opacity:0;
transform:translateY(-150px);
}

}
</style>
</head>

<body>
 <div id="introScreen">
    <h1>✨ For Someone Very Special ✨</h1>
    <p>A beautiful surprise is waiting for you... ❤️</p>
</div>

<div class="container">

 <div id="welcome" style="text-align:center;margin-top:100px;">
<h1>🎂 Happy Birthday Situu ❤️</h1>
<p>Someone has a special surprise for you... 💖</p>
</div>
<div id="giftBox" class="gift-box" onclick="openGift()">
🎁<br>
Open My Gift
</div>

<div id="mainContent" class="fade-in" style="display:none;">
<p>
May Allah bless your life with happiness,
peace,
good health,
and endless smiles. 🤲❤️
</p>

<img id="slide" class="photo" src="photo1.jpg">

<div class="letter">

<h2>💌 My Letter</h2>
 
<p id="letterText"></p>
</div>
 <canvas id="fireworks"></canvas>
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

</div>
 
<script>
const photos = [
    "photo1.jpg",
    "photo2.jpg",
    "photo3.jpg",
    "photo4.jpg",
    "photo5.jpg",
    "photo6.jpg"
];

let current = 0;

setInterval(function () {
    current = (current + 1) % photos.length;
    document.getElementById("slide").src = photos[current];
}, 2500);

// Falling Hearts ❤️
function createHeart() {
    const heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.style.position = "fixed";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = "-30px";
    heart.style.fontSize = "24px";
    heart.style.pointerEvents = "none";
    heart.style.transition = "top 5s linear";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.style.top = "110vh";
    }, 100);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 500);
    // Fireworks
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function firework() {
  const x = Math.random() * canvas.width;
  const y = Math.random() * (canvas.height / 2);

  for (let i = 0; i < 50; i++) {
    ctx.beginPath();
ctx.fillStyle = `hsl(${Math.random() * 360},100%,60%)`;
    ctx.arc(
      x + Math.random() * 120 - 60,
      y + Math.random() * 120 - 60,
      3,
      0,
      Math.PI * 2
    );
    ctx.fill();
  }

  setTimeout(() => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }, 500);
}

setInterval(firework, 1500);

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
 // Confetti
function createConfetti() {

  const confetti = document.createElement("div");
  confetti.className = "confetti";

  confetti.style.left = Math.random() * window.innerWidth + "px";
  confetti.style.background =
   `hsl(${Math.random()*360},100%,60%)`;

  confetti.style.animationDuration =
    (3 + Math.random() * 3) + "s";

  document.body.appendChild(confetti);

  setTimeout(() => {
    confetti.remove();
  }, 6000);
}

setInterval(createConfetti, 200);
 // Balloons
function createBalloon(){

  const balloon = document.createElement("div");
  balloon.className = "balloon";

  balloon.style.left = Math.random() * window.innerWidth + "px";
  balloon.style.background =
   `hsl(${Math.random()*360},80%,70%)`;

  balloon.style.animationDuration =
    (6 + Math.random() * 4) + "s";

  document.body.appendChild(balloon);

  setTimeout(()=>{
    balloon.remove();
  },10000);
}

setInterval(createBalloon,1200);
 // Sparkles
function createSparkle(){

  const sparkle = document.createElement("div");
  sparkle.className = "sparkle";

  sparkle.style.left = Math.random() * window.innerWidth + "px";
  sparkle.style.top = Math.random() * window.innerHeight + "px";

  document.body.appendChild(sparkle);

  setTimeout(()=>{
    sparkle.remove();
  },2000);
}

setInterval(createSparkle,300);
 // Rose Petals
function createPetal(){

  const petal = document.createElement("div");
  petal.className = "petal";

  petal.innerHTML = "🌹";

  petal.style.left = Math.random() * window.innerWidth + "px";
  petal.style.animationDuration =
    (5 + Math.random() * 4) + "s";

  document.body.appendChild(petal);

  setTimeout(()=>{
    petal.remove();
  },9000);
}

setInterval(createPetal,1500);
function openGift() {

  document.getElementById("welcome").style.display = "none";

  document.getElementById("giftBox").style.display = "none";

  document.getElementById("mainContent").style.display = "block";

const music = document.getElementById("music");

music.currentTime = 0;

music.play().catch(() => {
    console.log("Music couldn't start automatically.");
});

  document.getElementById("letterText").innerHTML = "";
  i = 0;

  typeWriter();
 setTimeout(function(){

  document.getElementById("finalMessage").style.display = "block";

},15000);
 setInterval(createLoveQuote,4000);

}
 const message =
`Happy Birthday, Sitrelah. ❤️

Thank you for being such a wonderful person.

I pray Allah gives you happiness, success, good health, and protects you every single day.

Never stop smiling. 🌹
With Love,


❤️ Alif ❤️`;

let i = 0;

function typeWriter() {

  if (i < message.length) {
    document.getElementById("letterText").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 50);
  }

}

 const loveQuotes = [

"I Love You ❤️",

"You Are My Happiness 🥹",

"Forever With You 💖",

"My Beautiful Situuu 🌹",

"Allah Bless You 🤲❤️",

"You Mean Everything To Me ❤️"

];

function createLoveQuote(){

const quote = document.createElement("div");

quote.className = "loveQuote";

quote.innerHTML =
loveQuotes[Math.floor(Math.random()*loveQuotes.length)];

quote.style.left =
Math.random()*(window.innerWidth-250)+"px";

quote.style.top =
Math.random()*(window.innerHeight-150)+"px";

document.body.appendChild(quote);

setTimeout(function(){

quote.remove();

},6000);

}

window.onload = function () {

  document.getElementById("introScreen").style.display = "flex";

  setTimeout(function(){

    document.getElementById("introScreen").style.display = "none";

    document.getElementById("welcome").style.display = "block";

    document.getElementById("giftBox").style.display = "block";

  },3000);

};

</script>

 <div id="finalMessage">
❤️ I Love You Forever ❤️
</div>
</body>
</html>
