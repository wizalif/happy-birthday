<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Letter ❤️</title>

  <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:linear-gradient(
135deg,
#8B005D,
#D81B60,
#FF69B4
);

font-family:Arial,sans-serif;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:30px;

overflow-x:hidden;

}

.letter{

background:rgba(255,255,255,0.92);

max-width:750px;

padding:35px;

border-radius:25px;

box-shadow:
0 0 30px rgba(255,255,255,.4);

border:2px solid rgba(255,255,255,.7);

backdrop-filter:blur(10px);

text-align:center;

animation:fadeIn 2s ease, floatBox 4s infinite alternate;

}

h1{

color:#D81B60;

margin-bottom:20px;

font-size:42px;

text-shadow:
0 0 10px #ffb6d9,
0 0 25px #ff69b4;

animation:titleGlow 2s infinite alternate;

}


@keyframes titleGlow{

from{

text-shadow:
0 0 10px #ffb6d9;

}

to{

text-shadow:
0 0 30px white;

}

}

#letterText{

font-size:22px;

line-height:1.9;

color:#444;

white-space:pre-line;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

#nextBtn{

background:white;

color:#D81B60;

border:none;

padding:15px 35px;

font-size:22px;

font-weight:bold;

border-radius:50px;

cursor:pointer;

transition:.3s;

box-shadow:
0 0 15px white;

animation:buttonGlow 1.5s infinite;

}


#nextBtn:hover{

transform:scale(1.1);

background:#ffe4ee;

}


@keyframes buttonGlow{

0%{

box-shadow:0 0 10px white;

}

50%{

box-shadow:0 0 30px #ffb6d9;

}

100%{

box-shadow:0 0 10px white;

}

}

#nextBtn:hover{

transform:scale(1.08);

}
    .heart{

position:fixed;

top:-40px;

font-size:25px;

pointer-events:none;

animation:fallHeart linear forwards;

z-index:999;

}


@keyframes fallHeart{

0%{

transform:translateY(0);

opacity:1;

}

100%{

transform:translateY(110vh);

opacity:0;

}

}
    @keyframes floatBox{

from{

transform:translateY(0);

}

to{

transform:translateY(-10px);

}

}
</style>
</head>

<body>

<div class="letter">

<h1>💌 My Letter For You ❤️</h1>

<p id="letterText"></p>
  <div id="nextPage" style="display:none; margin-top:30px;">

<a href="end.html" onclick="finalTransition()">

<button id="nextBtn">

Open Final Chapter 🌹

</button>

</a>

</div>

</div>

  <script>

const message = `
ልቤ
ወደ አንቺ ስመለከት ደስታዬን ህልሜን መኖሪያዬን እንዳገኘሁ አውቃለሁ። ወደ ሕይወቴ ከመምጣትሽ በፊት ራሴን በፍቅር እንደዚህ ሰላማዊ እና ጠንካራ ልሆን እንደምችል አላውቅም ነበር።በፍቅር ላይ ጠንካራ ሰው አድርገሺኛል።አንቺ ከማንነቴ ውጭ ሌላ ሰው እንድሆን አትጠይቂኝም። ከአንቺ ጋር አእምሮዬ ሰላም ያገኛል፣ ልቤም ደህንነት ይሰማዋል። ከጎኔ በመጓዝሽ፣ ቀናቱ ከባድ ሲሆኑ እጄን በመያዝሽ፣ እና በደስታ ጊዜያት አብረሽኝ በመሳቅሽ አመሰግናለሁ። አንቺ ለኔ ደስታዬ ፈገግታዬ አምነቴን የጣልኩብሽ ትልቁ ሀብቴ ትልቁ ህልሜም ነሽ። ትላንትም ዛሬም በሚቀጥሉት ቀናቶች ሁሉ እወድሻለሁ።
ያንቺው አፍቃሪ 😁😊 ሺ አመት ኑሪልኝ 😊
`;

let i = 0;

function typeWriter(){

if(i < message.length){

document.getElementById("letterText").innerHTML += message.charAt(i);

i++;

setTimeout(typeWriter,35);

}else{

document.getElementById("nextPage").style.display = "block";

}

}

    function createHeart(){

const heart = document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left =
Math.random()*window.innerWidth+"px";

heart.style.animationDuration =
(4 + Math.random()*3)+"s";

document.body.appendChild(heart);


setTimeout(()=>{

heart.remove();

},7000);

}


setInterval(createHeart,700);
window.onload = typeWriter;

    function finalTransition(){

document.body.style.transition="2s";

document.body.style.opacity="0";

}
    const music = document.getElementById("music");

music.play().catch(function(){});
</script>
  <audio id="music" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>
</body>

</html>
