<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forever ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:linear-gradient(135deg,#ff4d6d,#ff9ac1);

font-family:Arial,sans-serif;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

overflow:hidden;

text-align:center;

color:white;

}

.container{

padding:30px;

}

h1{

font-size:45px;

margin-bottom:20px;

}

p{

font-size:22px;

line-height:1.8;

margin-bottom:35px;

}
  #continueBtn{

background:white;

color:#ff4d6d;

border:none;

padding:15px 35px;

font-size:22px;

border-radius:40px;

cursor:pointer;

font-weight:bold;

transition:.3s;

}

#continueBtn:hover{

transform:scale(1.08);

background:#ffe4ee;

}
  #yesBtn,
#noBtn{

margin:15px;

padding:15px 35px;

font-size:22px;

font-weight:bold;

border:none;

border-radius:40px;

cursor:pointer;

transition:.3s;

}

#yesBtn{

background:#ffffff;

color:#ff4d6d;

}

#yesBtn:hover{

transform:scale(1.08);

}

#noBtn{

background:#444;

color:white;

position:absolute;

}

#noBtn:hover{

background:#666;

}

</style>

</head>

<body>

<div class="container" id="page1">

<h1>❤️ My Beautiful Situuu ❤️</h1>

<p>
There is one last question waiting for you...
🥹❤️
</p>

<button id="continueBtn">
❤️ Continue ❤️
</button>

</div>

<div class="container" id="page2" style="display:none;">

<h1>💍 Will You Stay With Me Forever? ❤️</h1>

<p>
You are the best gift Allah has given me. 🤲❤️
</p>

<a href="story.html">

<button id="yesBtn">
YES ❤️
</button>

</a>
  <button id="noBtn">
NO 🙈
</button>

</div>
  <script>

document.getElementById("continueBtn").onclick = function(){

    document.getElementById("page1").style.display = "none";

    document.getElementById("page2").style.display = "block";

};
    const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", moveButton);

noBtn.addEventListener("touchstart", moveButton);

function moveButton(){

const x = Math.random() * (window.innerWidth - 150);

const y = Math.random() * (window.innerHeight - 80);

noBtn.style.left = x + "px";

noBtn.style.top = y + "px";

}

</script>

</body>

</html>
